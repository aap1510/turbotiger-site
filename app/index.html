<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Turbo Tiger</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;margin:0;min-height:100vh;display:flex;flex-direction:column;gap:18px;align-items:center;justify-content:center;padding:18px;background:#fafafa;color:#111}
  .box{max-width:420px;padding:18px;text-align:center}
  a{color:#111;font-weight:700}
</style>
<link rel="stylesheet" href="../assets/turbotiger-site-ui.css" />
</head>
<body data-tt-background="fundo_geral">
<div class="box">
  <p>Redirecionando para o convite Turbo Tiger...</p>
  <p><a id="go" href="/convite/">Abrir convite</a></p>
</div>
<footer class="tt-site-footer">
  <a class="tt-social-link tt-social-left" data-tt-contact="instagram" href="#" target="_blank" rel="noopener" aria-label="Instagram Turbo Tiger" hidden>
    <img alt="Instagram">
  </a>
  <small>&copy; 2026 Turbo Tiger</small>
  <a class="tt-social-link tt-social-right" data-tt-contact="facebook" href="#" target="_blank" rel="noopener" aria-label="Facebook Turbo Tiger" hidden>
    <img alt="Facebook">
  </a>
</footer>
<a class="tt-whatsapp-float" data-tt-contact="whatsapp" href="#" target="_blank" rel="noopener" aria-label="Chamar atendimento no WhatsApp" hidden>
  <img alt="WhatsApp">
</a>
<script src="../assets/turbotiger-site-ui.js"></script>
<script>
const params = new URLSearchParams(location.search);
const ref = params.get("ref");
const target = ref ? "/convite/?ref=" + encodeURIComponent(ref) : "/convite/";
document.getElementById("go").href = target;
location.replace(target);
</script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="refresh" content="0; url=/convite/">
<title>Turbo Tiger</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fafafa;color:#111}
  .box{max-width:420px;padding:18px;text-align:center}
  a{color:#111;font-weight:700}
</style>
</head>
<body>
<div class="box">
  <p>Redirecionando para o convite Turbo Tiger...</p>
  <p><a id="go" href="/convite/">Abrir convite</a></p>
</div>
<script>
const params = new URLSearchParams(location.search);
const ref = params.get("ref");
const target = ref ? "/convite/?ref=" + encodeURIComponent(ref) : "/convite/";
document.getElementById("go").href = target;
location.replace(target);
</script>
</body>
</html>
